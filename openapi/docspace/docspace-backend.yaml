components:
  schemas:
    AddMcpServerRequestBody:
      required:
        - description
        - endpoint
        - name
      type: object
      properties:
        name:
          maxLength: 128
          type: string
          description: Unique display name for the server. Only letters, numbers, underscores, and hyphens are allowed. Maximum 128 characters.
          nullable: true
          example: my-custom-server
        description:
          maxLength: 255
          type: string
          description: Human-readable description of the server's purpose and capabilities. Maximum 255 characters.
          nullable: true
          example: Custom MCP server for project management tools
        endpoint:
          type: string
          description: Base URL of the MCP server endpoint. Must be a valid, reachable URL. The system will verify connectivity during registration.
          format: uri
          nullable: true
          example: https://mcp.example.com/sse
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional HTTP headers to include with every request to the MCP server (e.g., authentication tokens or API keys).
          nullable: true
          example:
            Authorization: Bearer token123
        icon:
          type: string
          description: Optional Base64-encoded icon image for the server. Used as the visual identifier in the UI.
          nullable: true
          example: https://example.com/icon.png
      additionalProperties: false
      description: Parameters for creating a new custom MCP server.
    AddRoomServersRequestBody:
      required:
        - servers
      type: object
      properties:
        servers:
          uniqueItems: true
          type: array
          items:
            type: string
            format: uuid
          description: Set of unique identifiers of MCP servers to associate with the room. A maximum of 5 servers can be assigned per room.
          nullable: true
          example:
            - 00000000-0000-0000-0000-000000000000
      additionalProperties: false
      description: Parameters specifying which MCP servers to assign to the room.
    AgentNewItemsDto:
      required:
        - agent
        - items
      type: object
      properties:
        agent:
          $ref: '#/components/schemas/FileEntryBaseDto'
        items:
          type: array
          items:
            $ref: '#/components/schemas/FileEntryBaseDto'
          description: The list of file entry items.
          nullable: true
      additionalProperties: false
      description: The agent new item's information.
    AiChatPrice:
      type: object
      properties:
        prompt:
          type: number
          format: double
        completion:
          type: number
          format: double
      additionalProperties: false
    AiProviderArrayWrapper:
      type: object
      properties:
        response:
          type: array
          items:
            $ref: '#/components/schemas/AiProviderDto'
        count:
          type: integer
          description: The total number of items in the response
          format: int32
        links:
          type: array
          items:
            type: object
            properties:
              href:
                type: string
                description: URL of the link
              action:
                type: string
                description: Action associated with the link
          description: List of links related to the response
        status:
          type: integer
          description: HTTP status code of the response
          format: int32
        statusCode:
          type: integer
          description: HTTP status code of the response (duplicate of status)
          format: int32
    AiProviderDto:
      required:
        - createdOn
        - modifiedOn
        - title
      type: object
      properties:
        id:
          type: integer
          description: AI provider identifier.
          format: int32
          example: 1
        title:
          type: string
          description: AI provider display title.
          nullable: true
          example: OpenAI
        type:
          $ref: '#/components/schemas/ProviderType'
        url:
          type: string
          description: API endpoint URL for the AI provider.
          nullable: true
          example: https://api.openai.com/v1
        createdOn:
          $ref: '#/components/schemas/ApiDateTime'
        modifiedOn:
          $ref: '#/components/schemas/ApiDateTime'
        needReset:
          type: boolean
          description: Indicates whether the provider's API key needs to be reset.
          example: false
        isDefault:
          type: boolean
          description: Indicates whether this provider is the default provider for the tenant.
          example: true
      additionalProperties: false
      description: AI provider details.
    AiProviderWrapper:
      type: object
      properties:
        response:
          $ref: '#/components/schemas/AiProviderDto'
        count:
          type: integer
          description: The total number of items in the response
          format: int32
        links:
          type: array
          items:
            type: object
            properties:
              href:
                type: string
                description: URL of the link
              action:
                type: string
                description: Action associated with the link
          description: List of links related to the response
        status:
          type: integer
          description: HTTP status code of the response
          format: int32
        statusCode:
          type: integer
          description: HTTP status code of the response (duplicate of status)
