  /api/2.0/files/{folderId}/session/{sessionId}:
    delete:
      tags:
        - Files / Operations
      summary: Aborts an in-progress file upload session.
      description: "This method allows users to cancel an ongoing upload session identified by the session ID.\r\nOnce the session is aborted, the associated resources will be cleaned up, and the session will no longer accept further uploads."
      operationId: abortUploadSession
      parameters:
        - name: sessionId
          in: path
          description: The session ID.
          required: true
          schema:
            type: string
            example: session-123-abc
        - name: folderId
          in: path
          description: The folder ID.
          required: true
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    post:
      tags:
        - Files / Operations
      summary: Resumes an ongoing file upload session for uploading additional chunks of data.
      description: "This method allows continuing an interrupted or partially completed file upload session by uploading subsequent data chunks.\r\nThe server will validate each uploaded chunk, update the session state, and respond with the status of the current upload. Once\r\nthe total bytes uploaded match the total file size, the file upload process is finalized and related events are triggered.\r\nIf the file is newly uploaded, the server responds with a \"201 Created\" status upon completion. If it overwrites an existing file,\r\nversioning information is updated accordingly. The method also triggers associated webhooks and socket notifications to reflect\r\nthe updated file state."
      operationId: uploadSession
      parameters:
        - name: folderId
          in: path
          description: The folder ID.
          required: true
          schema:
            type: integer
            format: int32
            example: 1
        - name: sessionId
          in: path
          description: The upload session ID.
          required: true
          schema:
            type: string
            example: session_abc123
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                File:
                  type: string
                  description: "The file to be uploaded as part of the multipart/form-data request.\r\nThis property represents the uploaded file content from the HTTP request form.\r\nThe file is accessed via the IFormFile interface which provides access to the file name, content type, length, and stream."
                  format: binary
                  example: "\r\n             Example of sending a file using curl:\r\n             \r\n             curl -X POST \"https://api.example.com/api/2.0/files/folder/1/upload/session_abc123\" \\\r\n               -H \"Authorization: Bearer your_token\" \\\r\n               -F \"file=@/path/to/document.pdf\"\r\n             \r\n            \r\n             Example of sending a file using C# HttpClient:\r\n             \r\n             using var content = new MultipartFormDataContent();\r\n             using var fileStream = File.OpenRead(\"document.pdf\");\r\n             content.Add(new StreamContent(fileStream), \"file\", \"document.pdf\");\r\n            \r\n             var response = await httpClient.PostAsync(url, content);\r\n             "
            encoding:
              File:
                style: form
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionResponseIntegerWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/files/{folderId}/session/{sessionId}/upload:
    post:
      tags:
        - Files / Operations
      summary: Handles the upload of a chunk for an existing upload session.
      description: "This method allows the caller to upload a specific chunk of a file to an ongoing upload session.\r\nThe session is identified by the session ID provided in the request. The chunk can be of any size\r\nwithin the limits allowed during the session initialization. Each chunk must be uploaded in the\r\ncorrect order for the server to process it appropriately.\r\nThe server updates the upload session status and stores the progress information after processing\r\neach chunk. The updated session details are returned in the response."
      operationId: uploadAsyncSession
      parameters:
        - name: folderId
          in: path
          description: The folder ID.
          required: true
          schema:
            type: integer
            format: int32
            example: 1
        - name: sessionId
          in: path
          description: The upload session ID.
          required: true
          schema:
            type: string
            example: session_abc123
        - name: ChunkNumber
          in: query
          description: The chunk number.
          schema:
            type: integer
            format: int32
            example: 1
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                File:
                  type: string
                  description: "The file chunk to be uploaded as part of the multipart/form-data request.\r\nThis property represents the uploaded file chunk content from the HTTP request form for chunked upload operations.\r\nThe file chunk is accessed via the IFormFile interface which provides access to the chunk content and length."
                  format: binary
                  example: "\r\n             Example of sending a file chunk using curl:\r\n             \r\n             curl -X POST \"https://api.example.com/api/2.0/files/folder/1/upload/session_abc123?chunkNumber=1\" \\\r\n               -H \"Authorization: Bearer your_token\" \\\r\n               -F \"file=@/path/to/chunk1.part\"\r\n             \r\n            \r\n             Example of sending a file chunk using C# HttpClient:\r\n             \r\n             using var content = new MultipartFormDataContent();\r\n             var chunkStream = new MemoryStream(chunkBytes);\r\n             content.Add(new StreamContent(chunkStream), \"file\", \"document.pdf\");\r\n            \r\n             var response = await httpClient.PostAsync($\"{url}?chunkNumber=1\", content);\r\n             "
            encoding:
              File:
                style: form
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkedUploadSessionResponseIntegerWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
