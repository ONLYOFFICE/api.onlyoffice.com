  /api/2.0/security/audit/login/filter:
    get:
      tags:
        - Security / Login history
      summary: Get filtered login events
      description: Returns a list of the login events by the parameters specified in the request.
      operationId: getLoginEventsByFilter
      parameters:
        - name: userId
          in: query
          description: The ID of the user whose login events are being queried.
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
        - name: action
          in: query
          description: The login-related action to filter events by.
          schema:
            $ref: '#/components/schemas/MessageAction'
          example: FileCreated
        - name: from
          in: query
          description: The starting date and time for filtering login events.
          schema:
            $ref: '#/components/schemas/ApiDateTime'
          example: '2024-01-15T10:30:00Z'
        - name: to
          in: query
          description: The ending date and time for filtering login events.
          schema:
            $ref: '#/components/schemas/ApiDateTime'
          example: '2024-01-15T10:30:00Z'
        - name: count
          in: query
          description: The number of login events to retrieve in the query.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            example: 1
        - name: startIndex
          in: query
          description: The starting index for fetching a subset of login events from the query results.
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        '200':
          description: List of filtered login events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginEventArrayWrapper'
        '401':
          description: Unauthorized
        '402':
          description: Your pricing plan does not support this option
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
