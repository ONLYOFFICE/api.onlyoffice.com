          description: The allowed origins for the client
          example:
            - http://allowed.origin
          items:
            type: string
            description: The allowed origins for the client
            example: '["http://allowed.origin"]'
      description: Client update request containing modified client details
    ClientResponse:
      type: object
      properties:
        name:
          type: string
          description: The client name.
        description:
          type: string
          description: The client description.
        tenant:
          type: integer
          format: int64
          description: The tenant ID associated with the client.
        scopes:
          uniqueItems: true
          type: array
          description: The client scopes.
          items:
            type: string
        enabled:
          type: boolean
          description: Specifies if the client is currently enabled or not.
        client_id:
          type: string
          description: The client identifier issued to the client during registration.
        client_secret:
          type: string
          description: The client secret issued to the client during registration.
        website_url:
          type: string
          description: The URL to the client's website.
        terms_url:
          type: string
          description: The URL to the client's terms of service.
        policy_url:
          type: string
          description: The URL to the client's privacy policy.
        logo:
          type: string
          description: The URL to the client's logo.
        authentication_methods:
          uniqueItems: true
          type: array
          description: The authentication methods supported by the client.
          items:
            type: string
        redirect_uris:
          uniqueItems: true
          type: array
          description: The list of allowed redirect URIs.
          items:
            type: string
        allowed_origins:
          uniqueItems: true
          type: array
          description: The list of allowed CORS origins.
          items:
            type: string
        logout_redirect_uris:
          uniqueItems: true
          type: array
          description: The list of allowed logout redirect URIs.
          items:
            type: string
        created_on:
          type: string
          description: The date and time when the client was created.
          format: date-time
        created_by:
          type: string
          description: The user who created the client.
        modified_on:
          type: string
          description: The date and time when the client was last modified.
          format: date-time
        modified_by:
          type: string
          description: The user who last modified the client.
        is_public:
          type: boolean
          description: Indicates whether the client is accessible by third-party tenants.
    CreateClientRequest:
      required:
        - allowed_origins
        - redirect_uris
      type: object
      properties:
        name:
          maxLength: 256
          minLength: 3
          type: string
          description: The client name.
          example: Example Client
        description:
          maxLength: 255
          minLength: 0
          type: string
          description: The description of the client
          example: Description of the client
        logo:
          minLength: 1
          pattern: ^data:image\/(?:png|jpeg|jpg|svg\+xml);base64,.*.{1,}
          type: string
          description: The logo of the client in base64 format
          example: data:image/png;base64,...
        scopes:
          minItems: 1
          uniqueItems: true
          type: array
          description: The scopes for the client
          example:
            - read
            - write
          items:
            type: string
            description: The scopes for the client
            example: '["read","write"]'
        public:
          type: boolean
        allow_pkce:
          type: boolean
          description: Indicates whether PKCE is allowed for the client
          example: true
        is_public:
          type: boolean
          description: Indicates if the client is public
          example: false
        website_url:
          minLength: 1
          pattern: ^(https?://)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$|^https?://(\d{1,3}\.){3}\d{1,3}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$
          type: string
          description: The website URL of the client
          example: http://example.com
        terms_url:
          minLength: 1
          pattern: ^(https?://)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$|^https?://(\d{1,3}\.){3}\d{1,3}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$
          type: string
          description: The terms URL of the client
          example: http://example.com/terms
        policy_url:
          minLength: 1
          pattern: ^(https?://)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$|^https?://(\d{1,3}\.){3}\d{1,3}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$
          type: string
          description: The policy URL of the client
          example: http://example.com/policy
        redirect_uris:
          maxItems: 12
          minItems: 1
          uniqueItems: true
          type: array
          description: The redirect URIs for the client
          example:
            - http://example.com/redirect
          items:
            type: string
            description: The redirect URIs for the client
            example: '["http://example.com/redirect"]'
        allowed_origins:
          maxItems: 12
          minItems: 1
          uniqueItems: true
          type: array
          description: The allowed origins for the client
          example:
            - http://example.com
          items:
            type: string
            description: The allowed origins for the client
            example: '["http://example.com"]'
        logout_redirect_uri:
          minLength: 1
          pattern: ^(https?://)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$|^https?://(\d{1,3}\.){3}\d{1,3}(:\d+)?(/[a-zA-Z0-9-._~:/?#\[\]@!$&'()*+,;=]*)?$
          type: string
          description: The logout redirect URI for the client
          example: http://example.com/logout
      description: Client creation request containing client details
    ClientSecretResponse:
      type: object
      description: The response containing the regenerated client secret.
      properties:
        client_secret:
          type: string
          description: The newly generated client secret.
    ChangeClientActivationRequest:
      required:
        - status
      type: object
      properties:
        status:
          type: boolean
          description: The activation status of the client
          example: true
      description: Client activation change request
    ScopeResponse:
      type: object
      description: The response containing the scope information.
      properties:
        name:
          type: string
          description: The scope name.
        group:
          type: string
          description: The group the scope belongs to.
        type:
          type: string
          description: The scope type.
    PageableResponse:
      type: object
      description: The response containing paginated data.
      properties:
        data:
          type: object
          description: The paginated data.
        limit:
          type: integer
          description: The maximum number of results returned per page.
          format: int32
        last_client_id:
          type: string
          description: The identifier of the last retrieved client.
        last_created_on:
          type: string
          format: date-time
          description: The creation date of the last retrieved client.
    ClientInfoResponse:
      type: object
      description: The response containing public client information.
      properties:
        name:
          type: string
          description: The client name.
        description:
          type: string
          description: The client description.
        scopes:
          uniqueItems: true
          type: array
          description: The client scopes.
          items:
            type: string
        public:
          type: boolean
        client_id:
          type: string
          description: The client ID.
        website_url:
          type: string
          description: The URL to the client's website
        terms_url:
          type: string
          description: The URL to the client's terms of service.
        policy_url:
          type: string
          description: The URL to the client's privacy policy.
        logo:
          type: string
          description: The client logo in base64 format.
        authentication_methods:
          uniqueItems: true
          type: array
          description: The authentication methods supported by the client.
          items:
            type: string
        is_public:
          type: boolean
          description: Indicates whether the client is accessible by third-party tenants.
        created_on:
          type: string
          format: date-time
          description: The date and time when the client was created.
        created_by:
          type: string
          description: The user who created the client.
        modified_on:
          type: string
          format: date-time
          description: The date and time when the client was last modified.
        modified_by:
          type: string
          description: The user who last modified the client.
    PageableResponseClientInfoResponse:
      type: object
      description: The response containing paginated client information.
      properties:
        data:
          type: object
          description: The paginated client data.
        limit:
          type: integer
          format: int32
