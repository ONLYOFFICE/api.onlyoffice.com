  /api/2.0/settings/webhooks/log:
    get:
      tags:
        - Settings / Webhooks
      summary: Get webhook logs
      description: Returns the logs of the webhook activities.
      operationId: getWebhooksLogs
      parameters:
        - name: deliveryFrom
          in: query
          description: The delivery start time for filtering webhook logs.
          schema:
            type: string
            format: date-time
            example: '2024-01-15T10:30:00Z'
        - name: deliveryTo
          in: query
          description: The delivery end time for filtering webhook logs.
          schema:
            type: string
            format: date-time
            example: '2024-01-15T10:30:00Z'
        - name: hookUri
          in: query
          description: The destination URL where webhooks are delivered.
          schema:
            type: string
            example: https://example.com/webhook
        - name: configId
          in: query
          description: The webhook configuration identifier.
          schema:
            type: integer
            format: int32
            example: 1
        - name: eventId
          in: query
          description: The unique identifier of the event that triggered the webhook.
          schema:
            type: integer
            format: int32
            example: 1
        - name: groupStatus
          in: query
          description: The status of the webhook delivery group.
          schema:
            $ref: '#/components/schemas/WebhookGroupStatus'
          example: NotSent
        - name: userId
          in: query
          description: The identifier of the user associated with the webhook event.
          schema:
            type: string
            format: uuid
            example: '{}'
        - name: trigger
          in: query
          description: The type of event that triggered the webhook.
          schema:
            $ref: '#/components/schemas/WebhookTrigger'
          example: 0
        - name: count
          in: query
          description: The maximum number of webhook log records to return in the query response.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            example: 1
        - name: startIndex
          in: query
          description: "Specifies the starting index for retrieving webhook logs.\r\nUsed for pagination in the webhook delivery log queries."
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        '200':
          description: Logs of the webhook activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhooksLogArrayWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
