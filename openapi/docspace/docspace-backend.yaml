  /api/2.0/files/file/{fileId}/saveediting:
    put:
      tags:
        - Files / Files
      summary: Save file edits
      description: Saves edits to a file with the ID specified in the request.
      operationId: saveEditingFileFromForm
      parameters:
        - name: fileId
          in: path
          description: The editing file ID from the request.
          required: true
          schema:
            type: integer
            format: int32
            example: 1
        - name: DownloadUri
          in: query
          description: The URI to download the editing file.
          schema:
            type: string
            example: https://example.com/file.txt
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                FileExtension:
                  type: string
                  description: The editing file extension from the request.
                  example: .txt
                File:
                  type: string
                  description: "The edited file to be saved, uploaded as part of the multipart/form-data request.\r\nThis property represents the modified file content from the HTTP request form after editing operations.\r\nThe file is accessed via the IFormFile interface which provides access to the file name, content type, length, and stream."
                  format: binary
                  example: "\r\n             Example of saving an edited file using curl:\r\n             \r\n             curl -X PUT \"https://api.example.com/api/2.0/files/file/123/saveediting\" \\\r\n               -H \"Authorization: Bearer your_token\" \\\r\n               -F \"File=@/path/to/edited_document.docx\" \\\r\n               -F \"FileExtension=.docx\" \\\r\n               -F \"Forcesave=false\"\r\n             \r\n            \r\n             Example of saving an edited file using C# HttpClient:\r\n             \r\n             using var content = new MultipartFormDataContent();\r\n             using var fileStream = File.OpenRead(\"edited_document.docx\");\r\n             content.Add(new StreamContent(fileStream), \"File\", \"edited_document.docx\");\r\n             content.Add(new StringContent(\".docx\"), \"FileExtension\");\r\n             content.Add(new StringContent(\"false\"), \"Forcesave\");\r\n            \r\n             var response = await httpClient.PutAsync(url, content);\r\n             "
                Forcesave:
                  type: boolean
                  description: Specifies whether to force save the file or not.
                  example: false
            encoding:
              FileExtension:
                style: form
              File:
                style: form
              Forcesave:
                style: form
      responses:
        '200':
          description: Saved file parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileIntegerWrapper'
        '400':
          description: No file id or folder id toFolderId determine provider
        '401':
          description: Unauthorized
        '403':
          description: You do not have enough permissions to edit the file
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
