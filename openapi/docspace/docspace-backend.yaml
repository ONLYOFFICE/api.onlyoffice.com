  /api/2.0/security/audit/events/filter:
    get:
      tags:
        - Security / Audit trail data
      summary: Get filtered audit trail data
      description: Returns a list of the audit events by the parameters specified in the request.
      operationId: getAuditEventsByFilter
      parameters:
        - name: userId
          in: query
          description: The ID of the user who triggered the audit event.
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000001
        - name: moduleType
          in: query
          description: The location where the audit event occurred.
          schema:
            $ref: '#/components/schemas/LocationType'
          example: Files
        - name: actionType
          in: query
          description: The type of action performed in the audit event (e.g., Create, Update, Delete).
          schema:
            $ref: '#/components/schemas/ActionType'
          example: Create
        - name: action
          in: query
          description: The specific action that occurred within the audit event.
          schema:
            $ref: '#/components/schemas/MessageAction'
          example: FileCreated
        - name: entryType
          in: query
          description: The type of audit entry (e.g., Folder, User, File).
          schema:
            $ref: '#/components/schemas/EntryType'
          example: File
        - name: target
          in: query
          description: The target object affected by the audit event (e.g., document ID, user account).
          schema:
            type: string
            example: document.docx
        - name: from
          in: query
          description: The starting date and time for filtering audit events.
          schema:
            $ref: '#/components/schemas/ApiDateTime'
          example: '2024-01-01T00:00:00Z'
        - name: to
          in: query
          description: The ending date and time for filtering audit events.
          schema:
            $ref: '#/components/schemas/ApiDateTime'
          example: '2024-01-31T23:59:59Z'
        - name: count
          in: query
          description: The maximum number of audit event records to retrieve.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            example: 100
        - name: startIndex
          in: query
          description: The index of the first audit event record to retrieve in a paged query.
          schema:
            type: integer
            format: int32
            example: 0
      responses:
        '200':
          description: List of filtered audit trail data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventArrayWrapper'
        '401':
          description: Unauthorized
        '402':
          description: Your pricing plan does not support this option
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
