paths:
  /api/2.0/ai/agents:
    get:
      tags:
        - AI / Agents
      summary: Get ai agents
      description: Get ai agents
      operationId: getAgents
      parameters:
        - name: subjectId
          in: query
          description: The filter by user ID.
          schema:
            type: string
            example: 00000000-0000-0000-0000-000000000000
        - name: subjectOwnerId
          in: query
          description: The filter by room owner ID.
          schema:
            type: string
            example: 00000000-0000-0000-0000-000000000000
        - name: withoutTags
          in: query
          description: Specifies whether to search by tags or not.
          schema:
            type: boolean
            example: false
        - name: tags
          in: query
          description: The tags in the serialized format.
          schema:
            type: string
            example: ai,assistant
        - name: excludeSubject
          in: query
          description: Specifies whether to exclude search by user or group ID.
          schema:
            type: boolean
            example: false
        - name: subjectFilter
          in: query
          description: The filter by user (Owner - 0, Member - 1).
          schema:
            $ref: '#/components/schemas/SubjectFilter'
          example: 0
        - name: quotaFilter
          in: query
          description: The filter by quota (All - 0, Default - 1, Custom - 2).
          schema:
            $ref: '#/components/schemas/QuotaFilter'
          example: 0
        - name: count
          in: query
          description: Specifies the maximum number of items to retrieve.
          schema:
            maximum: 100
            minimum: 1
            type: integer
            format: int32
            example: 25
        - name: startIndex
          in: query
          description: The index from which to start retrieving the room content.
          schema:
            type: integer
            format: int32
            example: 0
        - name: sortBy
          in: query
          description: Specifies the field by which the room content should be sorted.
          schema:
            type: string
            example: DateAndTime
        - name: sortOrder
          in: query
          description: The order in which the results are sorted.
          schema:
            $ref: '#/components/schemas/SortOrder'
          example: 1
        - name: filterValue
          in: query
          description: The text filter value used to refine search or query operations.
          schema:
            type: string
            example: my agent
      responses:
        '200':
          description: Agent information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderContentIntegerWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    post:
      tags:
        - AI / Agents
      summary: Create an ai agent
      description: Creates an ai agent.
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequestDto'
      responses:
        '200':
          description: Agent information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderIntegerWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/agents/{id}:
    get:
      tags:
        - AI / Agents
      summary: Return an ai agent
      description: Returns an ai agent.
      operationId: getAgentInfo
      parameters:
        - name: id
          in: path
          description: The room ID.
          required: true
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        '200':
          description: Agent information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderIntegerWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    put:
      tags:
        - AI / Agents
      summary: Update an ai agent
      description: Updates an ai agent.
      operationId: updateAgent
      parameters:
        - name: id
          in: path
          description: The room ID.
          required: true
          schema:
            type: integer
            format: int32
            example: file-id
      requestBody:
        description: The request parameters for updating a room.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomRequest'
        required: true
      responses:
        '200':
          description: Updated agent information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderIntegerWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    delete:
      tags:
        - AI / Agents
      summary: Remove an ai agent
      description: Removes an ai agent.
      operationId: deleteAgent
      parameters:
        - name: id
          in: path
          description: The room ID.
          required: true
          schema:
            type: integer
            format: int32
            example: 10
      requestBody:
        description: The parameters for deleting a room.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRoomRequest'
        required: true
      responses:
        '200':
          description: File operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileOperationWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/agents/agentquota:
    put:
      tags:
        - AI / Agents
      summary: Change the AI agent quota limit
      description: Changes the quota limit for the AI agents with the IDs specified in the request.
      operationId: updateAgentsQuota
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomsQuotaRequestDtoInteger'
      responses:
        '200':
          description: List of AI agents with the detailed information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderIntegerArrayWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/agents/resetquota:
    put:
      tags:
        - AI / Agents
      summary: Reset the AI agents quota limit
      description: Resets the quota limit for the AI agents with the IDs specified in the request.
      operationId: resetAgentsQuota
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomsRoomIdsRequestDtoInteger'
      responses:
        '200':
          description: List of AI agents with the detailed information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FolderIntegerArrayWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/agents/news:
    get:
      tags:
        - AI / Agents
      summary: Get the room new items
      description: Returns the room new items.
      operationId: getAgentsNewItems
      responses:
        '200':
          description: List of new items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewItemsAgentNewItemsArrayWrapper'
        '401':
          description: Unauthorized
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/rooms/{roomId}/chats:
    post:
      tags:
        - AI / Chat
      summary: Start a new AI chat
      description: "Creates a new AI chat session within the specified room and sends the initial message to the configured AI provider.\r\nThe response is delivered as a Server-Sent Events (SSE) stream containing completion chunks (text deltas, tool calls, tool results, and message lifecycle events)\r\nwith periodic keep-alive pings every 5 seconds. File references can be included as context for the AI model."
      operationId: startNewChat
      parameters:
        - name: roomId
          in: path
          description: The identifier of the room in which to create the new AI chat session.
          required: true
          schema:
            type: integer
            format: int32
            example: 42
      requestBody:
        description: The initial message and optional file attachments.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartNewChatBody'
        required: true
      responses:
        '200':
          description: SSE stream of ChatCompletion events (text/event-stream)
        '400':
          description: The message is empty or one or more file attachments could not be processed
        '401':
          description: Unauthorized
        '403':
          description: You don't have enough permission to access the chat in this room
        '404':
          description: The specified room or AI provider was not found
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    get:
      tags:
        - AI / Chat
      summary: Get AI chats in a room
      description: "Returns a paginated list of AI chat sessions that belong to the current user within the specified room.\r\nSupports pagination via the startIndex and count query parameters. The total number of chats is included in the response metadata."
      operationId: getChats
      parameters:
        - name: roomId
          in: path
          description: The identifier of the room whose AI chat sessions are to be listed.
          required: true
          schema:
            type: integer
            format: int32
            example: 42
        - name: startIndex
          in: query
          description: The number of items to skip before returning results (zero-based offset). Defaults to 0.
          schema:
            type: integer
            format: int32
            example: 0
        - name: count
          in: query
          description: The maximum number of items to return per page. Defaults to 100.
          schema:
            type: integer
            format: int32
            example: 100
      responses:
        '200':
          description: Paginated list of chat sessions in the room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatArrayWrapper'
        '401':
          description: Unauthorized
        '403':
          description: You don't have enough permission to access chats in this room
        '404':
          description: The room with the specified ID was not found
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/chats/{chatId}/messages:
    post:
      tags:
        - AI / Chat
      summary: Send a message to an existing AI chat
      description: "Appends a new user message to an existing chat session and streams the AI assistant's response.\r\nThe full conversation history of the chat is sent to the AI provider to maintain context.\r\nThe response is delivered as a Server-Sent Events (SSE) stream with periodic keep-alive pings.\r\nFile references can optionally be attached to provide additional context."
      operationId: continueChat
      parameters:
        - name: chatId
          in: path
          description: The unique identifier of the existing AI chat session to continue.
          required: true
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      requestBody:
        description: The message and optional file attachments.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinueChatBody'
        required: true
      responses:
        '200':
          description: SSE stream of ChatCompletion events (text/event-stream)
        '400':
          description: The message is empty or one or more file attachments could not be processed
        '401':
          description: Unauthorized
        '403':
          description: You don't have enough permission to access the chat in this room
        '404':
          description: The specified chat, room, or AI provider was not found
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    get:
      tags:
        - AI / Chat
      summary: Get messages of an AI chat
      description: "Returns a paginated list of messages from an AI chat session owned by the current user.\r\nEach message includes its role (user or assistant), content blocks (text, tool calls, attachments), and timestamp.\r\nSupports pagination via the startIndex and count query parameters. The total number of messages is included in the response metadata."
      operationId: getMessages
      parameters:
        - name: chatId
          in: path
          description: The unique identifier of the AI chat session whose messages are to be listed.
          required: true
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
        - name: startIndex
          in: query
          description: The number of items to skip before returning results (zero-based offset). Defaults to 0.
          schema:
            type: integer
            format: int32
            example: 0
        - name: count
          in: query
          description: The maximum number of items to return per page. Defaults to 100.
          schema:
            type: integer
            format: int32
            example: 100
      responses:
        '200':
          description: Paginated list of messages in the chat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageArrayWrapper'
        '401':
          description: Unauthorized
        '404':
          description: The chat with the specified ID was not found or does not belong to the current user
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
  /api/2.0/ai/chats/{chatId}:
    put:
      tags:
        - AI / Chat
      summary: Rename an AI chat
      description: "Updates the display title of an existing AI chat session owned by the current user.\r\nThe new name must not exceed 255 characters."
      operationId: renameChat
      parameters:
        - name: chatId
          in: path
          description: The unique identifier of the AI chat session to rename.
          required: true
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      requestBody:
        description: The new chat name.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameChatBody'
        required: true
      responses:
        '200':
          description: Updated chat session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatWrapper'
        '401':
          description: Unauthorized
        '404':
          description: The chat with the specified ID was not found or does not belong to the current user
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
        - OpenId: []
    get:
      tags:
        - AI / Chat
      summary: Get an AI chat by ID
      description: "Retrieves the metadata of a single AI chat session, including its title, creation date, and the user who created it.\r\nOnly the chat owner can access their own chat sessions."
      operationId: getChat
      parameters:
        - name: chatId
          in: path
          description: The unique identifier of the AI chat session to retrieve.
          required: true
          schema:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Chat session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatWrapper'
        '401':
          description: Unauthorized
        '404':
          description: The chat with the specified ID was not found or does not belong to the current user
      security:
        - asc_auth_key:
            - read
            - write
        - Bearer: []
        - ApiKeyBearer:
            - read
            - write
        - Basic: []
        - OAuth2:
            - read
            - write
