name: Build & Publish Api

run-name: "Publish (site_mode: ${{github.event.inputs.site_mode}}, site: ${{github.event.inputs.site-publish}}, lambda: ${{github.event.inputs.lambda-publish}}, dev: ${{github.event.inputs.dev}})"

on:
  workflow_dispatch:
    inputs:
      site_mode:
        description: Site mode
        required: true
        default: testing
        type: choice
        options:
        #- development
        - testing
        - production
      site-publish:
        description: 'Want deploy site?'
        required: true
        default: true
        type: boolean
      lambda-publish:
        description: 'Want update lambda?'
        required: true
        default: false
        type: boolean
      chinese:
        description: 'Build chinese?'
        required: true
        default: true
        type: boolean
      dev:
        description: 'Add --dev flag to build?'
        required: true
        default: false
        type: boolean

env:
  CN: ${{ github.event.inputs.chinese }}
  mode: ${{ github.event.inputs.site_mode }}
  SITE_PUBLISH: ${{ github.event.inputs.site-publish }}
  LAMBDA_PUBLISH: ${{ github.event.inputs.lambda-publish }}
  teamlab_s3bucket_1: api-site-teamlab-info1
  teamlab_s3bucket_2: api-site-teamlab-info2
  com_s3bucket_1: api-site-onlyoffice-com1
  com_s3bucket_2: api-site-onlyoffice-com2

jobs:
  start-runner:
    name: Start AWS Runner
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_RUNNER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_RUNNER_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Start EC2 instance if stopped
        run: |
          STATE=$(aws ec2 describe-instances --instance-ids i-0d1670a99456ecce2 --query 'Reservations[0].Instances[0].State.Name' --output text)
          echo "Current instance state: ${STATE}"
          if [ "${STATE}" = "stopped" ]; then
            echo "Starting instance i-0d1670a99456ecce2..."
            aws ec2 start-instances --instance-ids i-0d1670a99456ecce2
            aws ec2 wait instance-running --instance-ids i-0d1670a99456ecce2
            echo "Instance started successfully."
          else
            echo "Instance is already in state '${STATE}', skipping start."
          fi

  publish:
    runs-on: ubuntu-latest-max
    needs: start-runner
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Environment
      env:
        AWS_ACCESS_KEY_PROD: ${{ secrets.AWS_ACCESS_KEY_PROD }}
        AWS_SECRET_KEY_PROD: ${{ secrets.AWS_SECRET_KEY_PROD }}
        AWS_DISTRIBUTION_ID_PROD: ${{ secrets.AWS_DISTRIBUTION_ID_PROD }}
        AWS_ACCESS_KEY_TEST: ${{ secrets.AWS_ACCESS_KEY_TEST }}
        AWS_SECRET_KEY_TEST: ${{ secrets.AWS_SECRET_KEY_TEST }}
        AWS_DISTRIBUTION_ID_TEST: ${{ secrets.AWS_DISTRIBUTION_ID_TEST }}
      run: |
        if [ "${mode}" = "production" ]; then
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_PROD}"           >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY_PROD}"       >> "$GITHUB_ENV"
          echo "AWS_REGION=us-east-1"                               >> "$GITHUB_ENV"
          echo "AWS_DISTRIBUTION_ID=${AWS_DISTRIBUTION_ID_PROD}"    >> "$GITHUB_ENV"
          echo "BUCKET_A=${com_s3bucket_1}"                         >> "$GITHUB_ENV"
          echo "BUCKET_B=${com_s3bucket_2}"                         >> "$GITHUB_ENV"
          echo "LAMBDA_TF_DIR=.github/api-site-redirects/prod/tf"   >> "$GITHUB_ENV"
          echo "CF_TF_DIR=.github/cf/prod"                          >> "$GITHUB_ENV"
        elif [ "${mode}" = "testing" ]; then
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_TEST}"           >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY_TEST}"       >> "$GITHUB_ENV"
          echo "AWS_REGION=us-east-1"                               >> "$GITHUB_ENV"
          echo "AWS_DISTRIBUTION_ID=${AWS_DISTRIBUTION_ID_TEST}"    >> "$GITHUB_ENV"
          echo "BUCKET_A=${teamlab_s3bucket_1}"                     >> "$GITHUB_ENV"
          echo "BUCKET_B=${teamlab_s3bucket_2}"                     >> "$GITHUB_ENV"
          echo "LAMBDA_TF_DIR=.github/api-site-redirects/test/tf"   >> "$GITHUB_ENV"
          echo "CF_TF_DIR=.github/cf/test"                          >> "$GITHUB_ENV"
        else
          echo "Invalid site mode: $mode"
          exit 1
        fi

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install nodejs
      if: ${{ env.SITE_PUBLISH == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      if: ${{ env.SITE_PUBLISH == 'true' }}
      run: npm install

    - name: Build Packages
      id: build
      if: ${{ env.SITE_PUBLISH == 'true' }}
      run: |
        LOCALE="--locale en"
        SUB_ARGS=""

        export SITE_MODE="$mode"

        #if [[ "$CN" == "true" ]]; then
        #   LOCALE="$LOCALE --locale zh-CN"
        #   # Docusaurus link issues fix — NOTE: remove after fix lands upstream
        #   mkdir -p i18n/zh-CN/docusaurus-plugin-content-docs-api/current2
        #   cp -r site/** i18n/zh-CN/docusaurus-plugin-content-docs-api/current2
        #   cp -r i18n/zh-CN/docusaurus-plugin-content-docs-api/current/** i18n/zh-CN/docusaurus-plugin-content-docs-api/current2
        #   rm -rf i18n/zh-CN/docusaurus-plugin-content-docs-api/current
        #   mv i18n/zh-CN/docusaurus-plugin-content-docs-api/current2 i18n/zh-CN/docusaurus-plugin-content-docs-api/current
        #fi

        #[[ "${{ github.event.inputs.dev }}" == "true" ]] && SUB_ARGS="--dev"

        free -h
        cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo "Memory limit info not available"

        export NODE_OPTIONS="--max-old-space-size=28672"
        export UV_THREADPOOL_SIZE=4
        export RSPACK_PARALLEL=3
        export RAYON_NUM_THREADS=3
        export TOKIO_WORKER_THREADS=4
        npm run build -- ${SUB_ARGS} --locale en --locale zh-CN
