name: Build & Publish Api

run-name: "Publish (site_mode: ${{github.event.inputs.site_mode}}, site: ${{github.event.inputs.site-publish}}, lambda: ${{github.event.inputs.lambda-publish}}, dev: ${{github.event.inputs.dev}})"

on:
  workflow_dispatch:
    inputs:
      site_mode:
        description: Site mode
        required: true
        default: testing
        type: choice
        options:
        #- development
        - testing
        - production
      site-publish:
        description: 'Want deploy site?'
        required: true
        default: true
        type: boolean
      lambda-publish:
        description: 'Want update lambda?'
        required: true
        default: false
        type: boolean
      chinese:
        description: 'Build chinese?'
        required: true
        default: true
        type: boolean
      dev:
        description: 'Add --dev flag to build?'
        required: true
        default: false
        type: boolean

env:
  CN: ${{ github.event.inputs.chinese }}
  mode: ${{ github.event.inputs.site_mode }}
  SITE_PUBLISH: ${{ github.event.inputs.site-publish }}
  LAMBDA_PUBLISH: ${{ github.event.inputs.lambda-publish }}
  teamlab_s3bucket_1: api-site-teamlab-info1
  teamlab_s3bucket_2: api-site-teamlab-info2
  com_s3bucket_1: api-site-onlyoffice-com1
  com_s3bucket_2: api-site-onlyoffice-com2

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Environment
      env:
        AWS_ACCESS_KEY_PROD: ${{ secrets.AWS_ACCESS_KEY_PROD }}
        AWS_SECRET_KEY_PROD: ${{ secrets.AWS_SECRET_KEY_PROD }}
        AWS_DISTRIBUTION_ID_PROD: ${{ secrets.AWS_DISTRIBUTION_ID_PROD }}
        AWS_ACCESS_KEY_TEST: ${{ secrets.AWS_ACCESS_KEY_TEST }}
        AWS_SECRET_KEY_TEST: ${{ secrets.AWS_SECRET_KEY_TEST }}
        AWS_DISTRIBUTION_ID_TEST: ${{ secrets.AWS_DISTRIBUTION_ID_TEST }}
      run: |
        if [ "${mode}" = "production" ]; then
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_PROD}"           >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY_PROD}"       >> "$GITHUB_ENV"
          echo "AWS_REGION=us-east-1"                               >> "$GITHUB_ENV"
          echo "AWS_DISTRIBUTION_ID=${AWS_DISTRIBUTION_ID_PROD}"    >> "$GITHUB_ENV"
          echo "BUCKET_A=${com_s3bucket_1}"                         >> "$GITHUB_ENV"
          echo "BUCKET_B=${com_s3bucket_2}"                         >> "$GITHUB_ENV"
          echo "LAMBDA_TF_DIR=.github/api-site-redirects/prod/tf"   >> "$GITHUB_ENV"
          echo "CF_TF_DIR=.github/cf/prod"                          >> "$GITHUB_ENV"
        elif [ "${mode}" = "testing" ]; then
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_TEST}"           >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY_TEST}"       >> "$GITHUB_ENV"
          echo "AWS_REGION=us-east-1"                               >> "$GITHUB_ENV"
          echo "AWS_DISTRIBUTION_ID=${AWS_DISTRIBUTION_ID_TEST}"    >> "$GITHUB_ENV"
          echo "BUCKET_A=${teamlab_s3bucket_1}"                     >> "$GITHUB_ENV"
          echo "BUCKET_B=${teamlab_s3bucket_2}"                     >> "$GITHUB_ENV"
          echo "LAMBDA_TF_DIR=.github/api-site-redirects/test/tf"   >> "$GITHUB_ENV"
          echo "CF_TF_DIR=.github/cf/test"                          >> "$GITHUB_ENV"
        else
          echo "Invalid site mode: $mode"
          exit 1
        fi

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.8
        terraform_wrapper: false

    - name: Get current active bucket from CF state
      id: get_bucket
      working-directory: ${{ env.CF_TF_DIR }}
      run: |
        terraform init -input=false -no-color
        CURRENT_BUCKET="$(terraform output -raw api_site_origin_bucket)"
        echo "Current active bucket (from CF state): ${CURRENT_BUCKET}"

        if [ "${CURRENT_BUCKET}" = "${BUCKET_A}" ]; then
          TARGET_BUCKET="${BUCKET_B}"
        elif [ "${CURRENT_BUCKET}" = "${BUCKET_B}" ]; then
          TARGET_BUCKET="${BUCKET_A}"
        else
          echo "::error::CF state references unknown bucket '${CURRENT_BUCKET}' (expected ${BUCKET_A} or ${BUCKET_B})"
          exit 1
        fi

        echo "Target bucket for this deploy: ${TARGET_BUCKET}"
        echo "CURRENT_BUCKET=${CURRENT_BUCKET}"     >> "$GITHUB_ENV"
        echo "TARGET_BUCKET=${TARGET_BUCKET}"       >> "$GITHUB_ENV"
        echo "AWS_BUCKET_URL=s3://${TARGET_BUCKET}" >> "$GITHUB_ENV"

    - name: Deploy lambda (terraform apply)
      id: lambda
      if: ${{ env.LAMBDA_PUBLISH == 'true' }}
      working-directory: ${{ env.LAMBDA_TF_DIR }}
      run: |
        terraform init -input=false -no-color
        terraform apply -auto-approve -input=false -no-color

    - name: Install nodejs
      if: ${{ env.SITE_PUBLISH == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      if: ${{ env.SITE_PUBLISH == 'true' }}
      run: npm install

    - name: Build Packages
      id: build
      if: ${{ env.SITE_PUBLISH == 'true' }}
      run: |
        LOCALE="--locale en"
        SUB_ARGS=""

        export SITE_MODE="$mode"

        if [[ "$CN" == "true" ]]; then
           LOCALE="$LOCALE --locale zh-CN"
           # Docusaurus link issues fix — NOTE: remove after fix lands upstream
           mkdir -p i18n/zh-CN/docusaurus-plugin-content-docs-api/current2
           cp -r site/** i18n/zh-CN/docusaurus-plugin-content-docs-api/current2
           cp -r i18n/zh-CN/docusaurus-plugin-content-docs-api/current/** i18n/zh-CN/docusaurus-plugin-content-docs-api/current2
           rm -rf i18n/zh-CN/docusaurus-plugin-content-docs-api/current
           mv i18n/zh-CN/docusaurus-plugin-content-docs-api/current2 i18n/zh-CN/docusaurus-plugin-content-docs-api/current
        fi

        [[ "${{ github.event.inputs.dev }}" == "true" ]] && SUB_ARGS="--dev"

        free -h
        cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo "Memory limit info not available"

        export NODE_OPTIONS="--max-old-space-size=8192"
        export UV_THREADPOOL_SIZE=4
        export RSPACK_PARALLEL=6
        export RAYON_NUM_THREADS=6
        export TOKIO_WORKER_THREADS=4
        npm run build -- ${SUB_ARGS} ${LOCALE}

    - name: Sync AWS Bucket
      id: sync
      if: ${{ env.SITE_PUBLISH == 'true' }}
      working-directory: build
      run: |
          ALL_LANGS=("zh-CN")
          BUILT_LANGS=("en")
          [[ "$CN" == "true" ]] && BUILT_LANGS+=("zh-CN")

          EXCLUDE_FLAGS=()
          for lang in "${ALL_LANGS[@]}"; do
            should_exclude=true
            for lg in "${BUILT_LANGS[@]}"; do
              if [[ "$lang" == "$lg" ]]; then
                should_exclude=false
                break
              fi
            done
            if [[ "$should_exclude" == true ]]; then
              EXCLUDE_FLAGS+=("--exclude \"${lang}/*\"")
            fi
          done
          EXCLUDE_STR=$(IFS=" " ; echo "${EXCLUDE_FLAGS[*]}")

          echo "Step 1: Sync HTML files with short cache"
          eval "aws s3 sync . ${AWS_BUCKET_URL} \
               --exclude \"*\" --include \"*.html\" \
               --cache-control \"public, max-age=0, must-revalidate\" \
               --content-type \"text/html\" \
               --delete $EXCLUDE_STR"

          echo "Step 2: Sync hashed assets (JS/CSS) with long cache"
          eval "aws s3 sync . ${AWS_BUCKET_URL} \
               --exclude \"*\" --include \"*.js\" --include \"*.css\" \
               --cache-control \"public, max-age=31536000, immutable\" \
               --delete $EXCLUDE_STR"

          echo "Step 3: Sync all other files"
          eval "aws s3 sync . ${AWS_BUCKET_URL} \
               --exclude \"*.html\" --exclude \"*.js\" --exclude \"*.css\" --include \"*\" \
               --cache-control \"public, max-age=86400\" \
               --delete $EXCLUDE_STR"

          echo "Find and compress files larger than 10MB"
          find . -type f \( -name "*.js" -o -name "*.json" -o -name "*.htm" \
            -o -name "*.html" -o -name "*.css" -o -name "*.bin" -o -name "*.wasm" -o -name "*.dic" -o -name "*.aff" -o -name "*.svg" \) \
            -size +10M | while read -r file; do
            echo "Compress: $file"
            gzip -9 -c "$file" > "$file.gz" && mv "$file.gz" "$file"
            MIME_TYPE=$(file --mime-type -b "$file")

            if [[ "$file" == *.js ]] || [[ "$file" == *.css ]]; then
              CACHE_CONTROL="public, max-age=31536000, immutable"
            elif [[ "$file" == *.html ]]; then
              CACHE_CONTROL="public, max-age=0, must-revalidate"
            else
              CACHE_CONTROL="public, max-age=86400"
            fi

            echo "Upload: $file (cache: $CACHE_CONTROL)"
            aws s3 cp "$file" "${AWS_BUCKET_URL}/${file#./}" \
              --content-encoding gzip \
              --content-type "$MIME_TYPE" \
              --cache-control "$CACHE_CONTROL"
          done

    - name: Update CloudFront (terraform apply)
      id: cfconf
      if: ${{ (env.SITE_PUBLISH == 'true' && steps.sync.outcome == 'success') || (env.LAMBDA_PUBLISH == 'true' && steps.lambda.outcome == 'success') }}
      working-directory: ${{ env.CF_TF_DIR }}
      run: |
       if [ "${{ steps.sync.outcome }}" = "success" ]; then
         BUCKET="${TARGET_BUCKET}"
       else
         BUCKET="${CURRENT_BUCKET}"
       fi
       terraform apply -auto-approve -input=false -no-color \
         -var="api_site_s3_bucket_name=${BUCKET}"

    - name: Invalidate AWS CloudFront Cache
      if: ${{ (env.SITE_PUBLISH == 'true' && steps.cfconf.outcome == 'success') || (env.LAMBDA_PUBLISH == 'true' && steps.lambda.outcome == 'success') }}
      run: |
        aws cloudfront create-invalidation --distribution-id ${AWS_DISTRIBUTION_ID} --paths '/*'

    - name: Collect statuses
      if: always()
      env:
        BUILD_STATUS: ${{ steps.build.outcome }}
        SYNC_STATUS: ${{ steps.sync.outcome }}
        CF_CONF_STATUS: ${{ steps.cfconf.outcome }}
        LAMBDA_STATUS: ${{ steps.lambda.outcome }}
      run: |
          to_emoji () {
            case "$1" in
              success)  echo "success🟢" ;;
              failure)  echo "failure🔴" ;;
              skipped)  echo "skipped⚪" ;;
              "")       echo "skipped⚪" ;;
              *)        echo "$1" ;;
            esac
          }
          echo "BUILD_STATUS=$(to_emoji "$BUILD_STATUS")"       >> "$GITHUB_ENV"
          echo "SYNC_STATUS=$(to_emoji "$SYNC_STATUS")"         >> "$GITHUB_ENV"
          echo "CF_CONF_STATUS=$(to_emoji "$CF_CONF_STATUS")"   >> "$GITHUB_ENV"
          echo "LAMBDA_STATUS=$(to_emoji "$LAMBDA_STATUS")"     >> "$GITHUB_ENV"

    - name: Send alert message
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
            Triggered by: ${{ github.actor }} (manual)

            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Mode: ${{ github.event.inputs.site_mode }}
            Site publish: ${{ github.event.inputs.site-publish }}
            Lambda publish: ${{ github.event.inputs.lambda-publish }}

            Source bucket: ${{ env.CURRENT_BUCKET }}
            Target bucket: ${{ env.TARGET_BUCKET }}

            Lambda apply status: ${{ env.LAMBDA_STATUS }}
            Api build status: ${{ env.BUILD_STATUS }}
            Api s3 sync status: ${{ env.SYNC_STATUS }}
            CloudFront apply status: ${{ env.CF_CONF_STATUS }}

            See commit changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            See action run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_number }}
